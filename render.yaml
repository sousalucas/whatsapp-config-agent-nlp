services:
  - type: web
    name: whatsapp-config-agent-nlp
    runtime: node
    buildCommand: npm install
    startCommand: npm run web
    envVars:
      - key: LLM_PROVIDER
        value: anthropic
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-20250514
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WATI_MODE
        value: mock
