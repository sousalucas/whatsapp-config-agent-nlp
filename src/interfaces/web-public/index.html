<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Config Agent</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <div class="header-row">
        <h1>💬 WhatsApp Config Agent</h1>
        <div class="header-controls">
          <button id="btn-tts" class="btn-icon" title="Read responses aloud" style="display:none;">🔇</button>
          <select id="lang-select" class="lang-select" title="Language">
            <option value="en">EN</option>
            <option value="pt">PT</option>
          </select>
        </div>
      </div>
      <p id="subtitle" class="subtitle"></p>
    </header>

    <div id="messages" class="messages"></div>

    <div id="recording-indicator" class="recording-indicator hidden">
      <div class="recording-dot"></div>
      <span id="recording-text"></span>
    </div>

    <div id="confirm-bar" class="confirm-bar hidden">
      <span id="confirm-prompt"></span>
      <button id="btn-confirm" class="btn btn-confirm"></button>
      <button id="btn-reject" class="btn btn-reject"></button>
    </div>

    <form id="input-form" class="input-area">
      <input
        type="text"
        id="user-input"
        autocomplete="off"
        autofocus
      />
      <button type="button" id="btn-mic" class="btn btn-mic" title="Voice input" style="display:none;">🎤</button>
      <button type="submit" id="btn-send" class="btn btn-send"></button>
    </form>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputForm = document.getElementById('input-form');
    const userInput = document.getElementById('user-input');
    const confirmBar = document.getElementById('confirm-bar');
    const btnConfirm = document.getElementById('btn-confirm');
    const btnReject = document.getElementById('btn-reject');
    const btnSend = document.getElementById('btn-send');
    const langSelect = document.getElementById('lang-select');
    const btnMic = document.getElementById('btn-mic');
    const btnTts = document.getElementById('btn-tts');
    const recordingIndicator = document.getElementById('recording-indicator');
    const recordingText = document.getElementById('recording-text');

    let pendingPlan = null;
    let i18n = {};

    // --- Text-to-Speech ---
    let ttsEnabled = false;

    if ('speechSynthesis' in window) {
      btnTts.style.display = '';
    }

    btnTts.addEventListener('click', () => {
      ttsEnabled = !ttsEnabled;
      btnTts.textContent = ttsEnabled ? '🔊' : '🔇';
      btnTts.classList.toggle('active', ttsEnabled);
      btnTts.title = ttsEnabled
        ? (i18n['web.tts_on'] || 'Voice responses on')
        : (i18n['web.tts_off'] || 'Voice responses off');
      if (!ttsEnabled) speechSynthesis.cancel();
    });

    function speakText(text) {
      if (!ttsEnabled || !('speechSynthesis' in window)) return;
      speechSynthesis.cancel();
      const cleanText = text
        .replace(/<[^>]*>/g, ' ')
        .replace(/[\u{1F000}-\u{1FFFF}]/gu, '')
        .replace(/\s+/g, ' ')
        .trim();
      if (!cleanText) return;
      const utterance = new SpeechSynthesisUtterance(cleanText);
      utterance.lang = langSelect.value === 'pt' ? 'pt-BR' : 'en-US';
      speechSynthesis.speak(utterance);
    }

    // --- Speech-to-Text ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let isRecording = false;

    if (SpeechRecognition) {
      btnMic.style.display = '';
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => {
        isRecording = true;
        btnMic.classList.add('recording');
        btnMic.textContent = '⏹';
        recordingIndicator.classList.remove('hidden');
        recordingText.textContent = i18n['web.listening'] || 'Listening...';
      };

      recognition.onresult = (event) => {
        let interimTranscript = '';
        let finalTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            finalTranscript += transcript;
          } else {
            interimTranscript += transcript;
          }
        }
        if (interimTranscript) {
          recordingText.textContent = interimTranscript;
        }
        if (finalTranscript.trim()) {
          sendMessage(finalTranscript.trim());
        }
      };

      recognition.onend = () => {
        isRecording = false;
        btnMic.classList.remove('recording');
        btnMic.textContent = '🎤';
        recordingIndicator.classList.add('hidden');
      };

      recognition.onerror = (event) => {
        isRecording = false;
        btnMic.classList.remove('recording');
        btnMic.textContent = '🎤';
        recordingIndicator.classList.add('hidden');
        if (event.error === 'not-allowed') {
          addMessage('assistant', escapeHtml(i18n['web.mic_denied'] || 'Microphone access was denied. Please allow microphone access in your browser settings.'));
        } else if (event.error === 'network') {
          addMessage('assistant', escapeHtml(i18n['web.mic_network_error'] || 'Speech recognition requires an internet connection.'));
        }
      };
    }

    function getSpeechLang() {
      const langMap = { en: 'en-US', pt: 'pt-BR' };
      return langMap[langSelect.value] || 'en-US';
    }

    function startRecording() {
      if (!recognition || isRecording) return;
      recognition.lang = getSpeechLang();
      try { recognition.start(); } catch (e) { /* already started */ }
    }

    function stopRecording() {
      if (!recognition || !isRecording) return;
      recognition.stop();
    }

    btnMic.addEventListener('click', () => {
      if (isRecording) { stopRecording(); } else { startRecording(); }
    });

    // --- Core UI ---

    async function fetchTranslations() {
      const res = await fetch('/api/translations');
      i18n = await res.json();
    }

    function applyTranslations() {
      document.getElementById('subtitle').textContent = i18n['web.subtitle'] || '';
      userInput.placeholder = i18n['web.placeholder'] || '';
      btnSend.textContent = i18n['web.send'] || '';
      document.getElementById('confirm-prompt').textContent = i18n['web.confirm_prompt'] || '';
      btnConfirm.textContent = i18n['web.confirm_yes'] || '';
      btnReject.textContent = i18n['web.confirm_no'] || '';
      btnMic.title = i18n['web.mic_title'] || 'Voice input';
    }

    function renderWelcomeMessage() {
      messagesEl.innerHTML = '';
      const welcome = i18n['web.welcome'] || '';
      const exTitle = i18n['web.examples_title'] || '';
      const ex1 = i18n['web.example1'] || '';
      const ex2 = i18n['web.example2'] || '';
      const ex3 = i18n['web.example3'] || '';
      const html = `${escapeHtml(welcome)}<br><br>` +
        `<strong>${escapeHtml(exTitle)}</strong>` +
        `<ul><li>"${escapeHtml(ex1)}"</li>` +
        `<li>"${escapeHtml(ex2)}"</li>` +
        `<li>"${escapeHtml(ex3)}"</li></ul>`;
      addMessage('assistant', html);
    }

    async function setServerLocale(locale) {
      await fetch('/api/locale', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ locale }),
      });
    }

    // Init: read ?lang= query param, sync with server, fetch translations
    (async function init() {
      const params = new URLSearchParams(window.location.search);
      const langParam = params.get('lang');

      if (langParam) {
        await setServerLocale(langParam);
        langSelect.value = langParam;
      } else {
        const res = await fetch('/api/locale');
        const data = await res.json();
        langSelect.value = data.locale;
      }

      await fetchTranslations();
      applyTranslations();
      renderWelcomeMessage();
    })();

    langSelect.addEventListener('change', async () => {
      if (isRecording) stopRecording();
      if ('speechSynthesis' in window) speechSynthesis.cancel();

      const locale = langSelect.value;
      await setServerLocale(locale);
      await fetchTranslations();
      applyTranslations();
      renderWelcomeMessage();

      const url = new URL(window.location);
      url.searchParams.set('lang', locale);
      window.history.replaceState({}, '', url);
    });

    function addMessage(role, html) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.innerHTML = `<div class="message-content">${html}</div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function formatPlan(plan) {
      let html = '<div class="plan">';
      html += '<strong>📋 Plan:</strong><ol>';
      for (const step of plan.steps) {
        const icon = step.destructive ? '⚠️ ' : '';
        html += `<li class="${step.destructive ? 'destructive' : ''}">${icon}${escapeHtml(step.description)}</li>`;
      }
      html += '</ol></div>';
      return html;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function setLoading(loading) {
      btnSend.disabled = loading;
      userInput.disabled = loading;
      btnMic.disabled = loading;
      if (loading) {
        addMessage('assistant', `<em>${escapeHtml(i18n['thinking'] || 'Thinking...')}</em>`);
      }
    }

    function removeThinking() {
      const msgs = messagesEl.querySelectorAll('.message.assistant');
      const last = msgs[msgs.length - 1];
      if (last && last.querySelector('em')) {
        last.remove();
      }
    }

    // --- Send message (used by both text input and voice) ---

    async function sendMessage(text) {
      addMessage('user', escapeHtml(text));
      setLoading(true);

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });
        const data = await res.json();
        removeThinking();

        if (data.error) {
          addMessage('assistant', `❌ ${escapeHtml(data.error)}`);
        } else if (data.plan && data.plan.steps.length > 0) {
          pendingPlan = data.plan;
          let html = '';
          if (data.text) html += `<p>${escapeHtml(data.text)}</p>`;
          html += formatPlan(data.plan);
          addMessage('assistant', html);
          if (data.text) speakText(data.text);

          if (data.plan.requiresConfirmation) {
            confirmBar.classList.remove('hidden');
            userInput.disabled = true;
            btnSend.disabled = true;
            btnMic.disabled = true;
          }
        } else if (data.text) {
          addMessage('assistant', data.text.replace(/\n/g, '<br>'));
          speakText(data.text);
        }
      } catch (err) {
        removeThinking();
        addMessage('assistant', `❌ Error: ${escapeHtml(err.message)}`);
      }

      setLoading(false);
    }

    inputForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = userInput.value.trim();
      if (!text) return;
      userInput.value = '';
      sendMessage(text);
    });

    btnConfirm.addEventListener('click', async () => {
      confirmBar.classList.add('hidden');
      addMessage('user', escapeHtml(i18n['web.confirmed'] || 'Confirmed'));
      setLoading(true);

      try {
        const res = await fetch('/api/confirm', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ confirmed: true }),
        });
        const data = await res.json();
        removeThinking();

        if (data.text) {
          addMessage('assistant', data.text.replace(/\n/g, '<br>'));
          speakText(data.text);
        }
      } catch (err) {
        removeThinking();
        addMessage('assistant', `❌ Error: ${escapeHtml(err.message)}`);
      }

      pendingPlan = null;
      setLoading(false);
      userInput.disabled = false;
      btnSend.disabled = false;
      btnMic.disabled = false;
      userInput.focus();
    });

    btnReject.addEventListener('click', async () => {
      confirmBar.classList.add('hidden');
      addMessage('user', escapeHtml(i18n['web.cancelled'] || 'Cancelled'));

      try {
        await fetch('/api/confirm', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ confirmed: false }),
        });
        const cancelMsg = i18n['plan.cancelled'] || 'Plan cancelled.';
        addMessage('assistant', escapeHtml(cancelMsg));
        speakText(cancelMsg);
      } catch (err) {
        addMessage('assistant', `❌ Error: ${escapeHtml(err.message)}`);
      }

      pendingPlan = null;
      userInput.disabled = false;
      btnSend.disabled = false;
      btnMic.disabled = false;
      userInput.focus();
    });
  </script>
</body>
</html>
